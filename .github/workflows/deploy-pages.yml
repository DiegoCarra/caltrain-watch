name: Refresh data and deploy Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install data dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Build current Caltrain snapshot
        env:
          TRANSIT_511_API_KEY: ${{ secrets.TRANSIT_511_API_KEY }}
          TRANSIT_511_OPERATOR_ID: ${{ vars.TRANSIT_511_OPERATOR_ID || 'CT' }}
        shell: bash
        run: |
          set +e
          python scripts/build_data.py --output public/data/caltrain.json
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "::warning::The live 511 build failed; deploying labeled demo data instead."
            python scripts/build_data.py --demo --output public/data/caltrain.json
          fi
          touch public/.nojekyll
          python -m json.tool public/data/caltrain.json >/dev/null

      - name: Read GitHub Pages configuration
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
