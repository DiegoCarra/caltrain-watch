name: Restore Caltrain Watch source

on:
  push:
    branches: [main]
    paths:
      - ".bootstrap/**"
      - ".github/workflows/bootstrap.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: restore-caltrain-watch
  cancel-in-progress: false

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore source tree
        shell: python
        run: |
          import base64
          import shutil
          import zipfile
          from pathlib import Path

          root = Path.cwd()
          encoded = "".join(
              part.read_text(encoding="utf-8").strip()
              for part in sorted((root / ".bootstrap").glob("part-*"))
          )
          archive_path = Path("/tmp/caltrain-watch.zip")
          archive_path.write_bytes(base64.b64decode(encoded, validate=True))

          restored = Path("/tmp/caltrain-watch-restored")
          if restored.exists():
              shutil.rmtree(restored)
          restored.mkdir(parents=True)
          with zipfile.ZipFile(archive_path) as archive:
              archive.testzip()
              archive.extractall(restored)

          source = restored / "caltrain-watch"
          if not (source / "README.md").exists():
              raise RuntimeError("Restored archive is missing the source tree")

          for item in root.iterdir():
              if item.name == ".git":
                  continue
              if item.is_dir():
                  shutil.rmtree(item)
              else:
                  item.unlink()

          for item in source.iterdir():
              target = root / item.name
              if item.is_dir():
                  shutil.copytree(item, target)
              else:
                  shutil.copy2(item, target)

      - name: Commit source tree
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Restore Caltrain Watch source"
          git push origin HEAD:main
